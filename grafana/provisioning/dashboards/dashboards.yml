apiVersion: 1

providers:
  # 启动 Grafana 时自动加载 grafana/dashboards 下的 JSON 面板。
  - name: ai-agent-portfolio
    orgId: 1
    folder: ai-agent-portfolio
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

apiVersion: 1

contactPoints:
  # Grafana 告警通知入口，目标地址由 .env 中的 INCIDENT_COPILOT_GRAFANA_WEBHOOK_URL 控制。
  - orgId: 1
    name: incident-copilot-grafana-webhook
    receivers:
      - uid: incident_copilot_webhook
        type: webhook
        settings:
          url: ${INCIDENT_COPILOT_GRAFANA_WEBHOOK_URL}
          httpMethod: POST
          title: ai-agent-portfolio 告警
          message: 来自 ai-agent-portfolio 指标的 Grafana 真实告警。

apiVersion: 1

groups:
  - orgId: 1
    name: ai-agent-portfolio-alerts
    folder: ai-agent-portfolio
    # Grafana 托管告警规则：本项目唯一的告警规则来源，并通过 webhook 通知 incident-copilot。
    interval: 30s
    rules:
      - uid: portfolio-ai-service-timeout
        title: PortfolioAiServiceTimeout
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: |
                (
                  sum(rate(portfolio_chat_ai_service_errors_total{error_type="AIServiceTimeout"}[5m]))
                  / clamp_min(sum(rate(portfolio_chat_requests_total[5m])), 1)
                )
                or
                (
                  histogram_quantile(0.95, sum(rate(portfolio_chat_ai_service_duration_seconds_bucket[5m])) by (le)) / 3
                )
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: ai-agent-portfolio
          endpoint: /api/chat/messages
          exception_type: AIServiceTimeout
          severity: P1
          error_rate: '0.02'
          p95_latency: '3'
          affected_requests: '10'
        annotations:
          summary: ai-agent-portfolio 调用 ai-service 处理聊天消息时出现超时
          description: 由 Java 后端到 ai-service 的真实指标触发的 Grafana 告警。

      - uid: portfolio-llm-provider-error
        title: PortfolioLlmProviderError
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_llm_requests_total{status="error"}[5m])) / clamp_min(sum(rate(portfolio_llm_requests_total[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: llm_chat_completion
          exception_type: LLMProviderError
          severity: P2
          error_rate: '0.02'
          affected_requests: '10'
        annotations:
          summary: portfolio-ai-service 调用 LLM 服务商失败或被限流
          description: 从真实 model_client 指标观察到 LLM 超时、限流或 5xx 错误。

      - uid: portfolio-rag-retrieval-empty
        title: PortfolioRagRetrievalEmptySpike
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_rag_retrieval_empty_total[5m])) / clamp_min(sum(rate(portfolio_rag_retrieve_total[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.10] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: retrieve_knowledge
          exception_type: RAGRetrievalEmpty
          severity: P2
          error_rate: '0.10'
          affected_requests: '10'
        annotations:
          summary: portfolio RAG 检索在多次请求中没有返回可用引用
          description: Qdrant 和 GraphRAG 未产出可用上下文。

      - uid: portfolio-qdrant-unavailable
        title: PortfolioQdrantUnavailable
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_qdrant_search_total{status="error"}[5m])) / clamp_min(sum(rate(portfolio_qdrant_search_total[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: qdrant_search
          exception_type: QdrantUnavailable
          severity: P1
          error_rate: '0.02'
          affected_requests: '10'
        annotations:
          summary: portfolio-ai-service 的 Qdrant 检索不可用或变慢
          description: 向量检索能力已降级。

      - uid: portfolio-graphrag-fallback-failure
        title: PortfolioGraphRagFallbackFailure
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_neo4j_query_total{operation="graphrag_fallback",status="error"}[5m])) / clamp_min(sum(rate(portfolio_neo4j_query_total{operation="graphrag_fallback"}[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: graphrag_fallback
          exception_type: GraphRagFallbackFailure
          severity: P2
          error_rate: '0.02'
          affected_requests: '3'
        annotations:
          summary: portfolio GraphRAG fallback 失败或未产出图谱上下文
          description: 观察到 Neo4j fallback 查询失败或图谱上下文为空。

      - uid: portfolio-knowledge-ingestion-failure
        title: PortfolioKnowledgeIngestionFailure
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(increase(portfolio_kb_ingestion_failures_total[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 30s
        labels:
          service: ai-agent-portfolio
          endpoint: knowledge_ingestion
          exception_type: KnowledgeIngestionFailure
          severity: P2
          affected_requests: '1'
        annotations:
          summary: ai-agent-portfolio 知识入库失败
          description: 上传、脚本执行、向量化、Qdrant 写入、Neo4j 写入或 MySQL 状态更新失败。

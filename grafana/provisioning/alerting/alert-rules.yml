apiVersion: 1

groups:
  - orgId: 1
    name: ai-agent-portfolio-alerts
    folder: ai-agent-portfolio
    interval: 30s
    rules:
      - uid: portfolio-ai-service-timeout
        title: PortfolioAiServiceTimeout
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: |
                (
                  sum(rate(portfolio_chat_ai_service_errors_total{error_type="AIServiceTimeout"}[5m]))
                  / clamp_min(sum(rate(portfolio_chat_requests_total[5m])), 1)
                )
                or
                (
                  histogram_quantile(0.95, sum(rate(portfolio_chat_ai_service_duration_seconds_bucket[5m])) by (le)) / 3
                )
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: ai-agent-portfolio
          endpoint: /api/chat/messages
          exception_type: AIServiceTimeout
          severity: P1
          error_rate: '0.02'
          p95_latency: '3'
          affected_requests: '10'
        annotations:
          summary: ai-agent-portfolio chat messages are timing out while calling ai-service
          description: Real Grafana alert generated from Java backend -> ai-service metrics.

      - uid: portfolio-llm-provider-error
        title: PortfolioLlmProviderError
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_llm_requests_total{status="error"}[5m])) / clamp_min(sum(rate(portfolio_llm_requests_total[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: llm_chat_completion
          exception_type: LLMProviderError
          severity: P2
          error_rate: '0.02'
          affected_requests: '10'
        annotations:
          summary: portfolio-ai-service LLM provider calls are failing or throttled
          description: LLM provider timeout/rate-limit/5xx observed from real model_client metrics.

      - uid: portfolio-rag-retrieval-empty
        title: PortfolioRagRetrievalEmptySpike
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_rag_retrieval_empty_total[5m])) / clamp_min(sum(rate(portfolio_rag_retrieve_total[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.10] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: retrieve_knowledge
          exception_type: RAGRetrievalEmpty
          severity: P2
          error_rate: '0.10'
          affected_requests: '10'
        annotations:
          summary: portfolio RAG retrieval returned no usable citations for many requests
          description: Qdrant and GraphRAG produced no usable context.

      - uid: portfolio-qdrant-unavailable
        title: PortfolioQdrantUnavailable
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_qdrant_search_total{status="error"}[5m])) / clamp_min(sum(rate(portfolio_qdrant_search_total[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: qdrant_search
          exception_type: QdrantUnavailable
          severity: P1
          error_rate: '0.02'
          affected_requests: '10'
        annotations:
          summary: portfolio-ai-service Qdrant search is unavailable or slow
          description: Vector retrieval is degraded.

      - uid: portfolio-graphrag-fallback-failure
        title: PortfolioGraphRagFallbackFailure
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(rate(portfolio_neo4j_query_total{operation="graphrag_fallback",status="error"}[5m])) / clamp_min(sum(rate(portfolio_neo4j_query_total{operation="graphrag_fallback"}[5m])), 1)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.02] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          service: portfolio-ai-service
          endpoint: graphrag_fallback
          exception_type: GraphRagFallbackFailure
          severity: P2
          error_rate: '0.02'
          affected_requests: '3'
        annotations:
          summary: portfolio GraphRAG fallback is failing or not producing graph context
          description: Neo4j fallback query failure or empty graph context observed.

      - uid: portfolio-knowledge-ingestion-failure
        title: PortfolioKnowledgeIngestionFailure
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: sum(increase(portfolio_kb_ingestion_failures_total[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model: { type: reduce, expression: A, reducer: last }
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: { from: 300, to: 0 }
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last }
                  type: query
        noDataState: OK
        execErrState: Alerting
        for: 30s
        labels:
          service: ai-agent-portfolio
          endpoint: knowledge_ingestion
          exception_type: KnowledgeIngestionFailure
          severity: P2
          affected_requests: '1'
        annotations:
          summary: ai-agent-portfolio knowledge ingestion failed
          description: Upload, script execution, embedding, Qdrant upsert, Neo4j write, or MySQL status update failed.

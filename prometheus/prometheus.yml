global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/portfolio-alerts.yml

scrape_configs:
  - job_name: ai-agent-portfolio-backend-java
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
        labels:
          service: ai-agent-portfolio
          component: backend-java

  - job_name: ai-agent-portfolio-ai-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8001
        labels:
          service: portfolio-ai-service
          component: ai-service

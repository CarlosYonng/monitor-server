services:
  prometheus:
    # Prometheus 只负责定时拉取各项目服务暴露的指标，不维护告警规则。
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: monitor-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    entrypoint:
      - /bin/sh
      - /etc/prometheus/build-config.sh
    extra_hosts:
      # 让容器可以访问宿主机上单独启动的 Java 后端、AI 服务和 incident-copilot。
      - "host.docker.internal:host-gateway"
    volumes:
      # 整个 prometheus 目录以只读方式挂载，包含主配置和 projects 树形目标配置。
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    # Grafana 负责展示仪表盘、计算告警规则，并把告警通过 webhook 推送给 ai-incident-copilot。
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:latest}
    container_name: monitor-grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      # 默认账号仅用于本地开发，生产环境请在 .env 中覆盖。
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INCIDENT_COPILOT_GRAFANA_WEBHOOK_URL: ${INCIDENT_COPILOT_GRAFANA_WEBHOOK_URL:-http://host.docker.internal:8080/api/alerts/grafana}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # provisioning 目录包含数据源、仪表盘、告警和通知策略的自动装载配置。
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
